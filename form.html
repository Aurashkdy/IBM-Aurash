<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Page</title>
</head>
<body>

    <h1 style="text-align: center; color: blue;">REGISTRATION PAGE</h1>

    <form action="formSUCCESS.html" method="get">

        <label for="username">Username:</label>
        <input type="text" id="username" name="username" maxlength="10" required>
        <br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>
        <br><br>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required>
        <br><br>

        <label for="confirmPassword">Confirm Password:</label>
        <input type="password" id="confirmPassword" name="confirmPassword" required>
        <br><br>

        <p>Gender:</p>

        <input type="radio" id="male" name="gender" value="Male" required>
        <label for="male">Male</label>

        <input type="radio" id="female" name="gender" value="Female">
        <label for="female">Female</label>

        <br><br>

        <p>Sports You Like:</p>

        <input type="checkbox" id="basketball" name="sports" value="Basketball">
        <label for="basketball">I like Basketball</label><br>

        <input type="checkbox" id="football" name="sports" value="Football">
        <label for="football">I like Football</label><br>

        <input type="checkbox" id="badminton" name="sports" value="Badminton">
        <label for="badminton">I like Badminton</label>

        <br><br>

        <input type="submit" value="Register">
        <input type="reset" value="Reset">

    </form>

</body>
</html>
